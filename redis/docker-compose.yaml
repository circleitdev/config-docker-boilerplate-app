services:
    citredis:
        image: redis:8.6.2
        container_name: citredis
        security_opt:
            - no-new-privileges:true
        networks:
            - citredis-network
        env_file: .env
        restart: unless-stopped
        command: ['redis-server']
        init: true
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 5s

networks:
    citredis-network:
        name: citredis-network
